version: "3.8"
services:
  db:
    image: postgis/postgis:17-3.5
    platform: linux/amd64
    environment:
      POSTGRES_DB: dottie
      POSTGRES_USER: dottie
      POSTGRES_PASSWORD: dottie_local
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dottie -d dottie"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - DB_URL=postgres://dottie:dottie_local@db:5432/dottie?sslmode=disable
      - PORT=8080
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
